# MSD configuration file.
# Place at: ~/.config/msd/config.yaml (Linux)
#           ~/Library/Application Support/msd/config.yaml (macOS)
#           %APPDATA%\msd\config.yaml (Windows)
#
# All values are optional — CLI flags and environment variables take precedence.

# Default download directory. CLI: -o / --output. Env: MSD_DOWNLOAD_DIR.
# download_dir: .

# Default max concurrent downloads. CLI: -c / --concurrency. Env: MSD_CONCURRENCY.
# Falls back to the site handler's default if not set (e.g. pixeldrain: 5).
# concurrency: 5

# Default delay between requests (Go duration string).
# CLI: --request-delay. Falls back to site handler's default if not set.
# request_delay: 0s

# Don't attempt to resume partial (.part) downloads. CLI: --no-resume.
# no_resume: false

# Site credentials are intentionally read from environment variables instead of
# this file so tokens are less likely to be committed by accident.
#
# Gofile:
#   MSD_GOFILE_TOKEN=...  Preferred account token variable.
#   GOFILE_TOKEN=...      Alternate account token variable.
#
# Live Gofile currently rate-limits or restricts some guest access, and that can
# be IP/environment-specific. Set a token before running downloads or integration
# tests for content that requires an account.

# Site-specific CLI flags:
#   --kemono-thumbnails   Download Kemono/Pawchive thumbnails instead of full
#                         attachment files.
