# MSD configuration file.
#
# Copy this file to your platform config directory:
#   Linux:    ~/.config/msd/config.yaml
#   macOS:    ~/Library/Application Support/msd/config.yaml
#   Windows:  %APPDATA%\msd\config.yaml
#
# All keys are optional. CLI flags and environment variables override this file.
# If you store credentials here, keep the file private:
#   chmod 600 ~/.config/msd/config.yaml

# Default download directory. ${XDG_DOWNLOAD_DIR} resolves to the user's
# platform Downloads folder, including localized XDG user-dirs on Linux.
# You can also use ~, $HOME, or another environment variable.
# CLI: --output / -o
# Env: MSD_DOWNLOAD_DIR
download_dir: "${XDG_DOWNLOAD_DIR}"

# Max concurrent downloads.
# 0 means "use the matched site's default".
# CLI: --concurrency / -c
# Env: MSD_CONCURRENCY
concurrency: 0

# Delay between download requests.
# 0s means "use the matched site's default".
# CLI: --request-delay
request_delay: 0s

# Disable resume from existing .part files.
# CLI: --no-resume
no_resume: false

# Site-specific settings and optional credentials.
sites:
  gofile:
    # Optional account token.
    #
    # MSD still tries guest/no-key access when this is empty. If set, the token
    # is used before cached guest tokens or automatic account creation.
    #
    # Env overrides:
    #   MSD_GOFILE_TOKEN
    #   GOFILE_TOKEN
    account_token: ""

# Site-specific CLI flags that intentionally remain flags:
#   --kemono-thumbnails   Download Kemono/Pawchive thumbnails instead of full
#                         attachment files.
